name: Arduino Compile & Flash

on:
  workflow_dispatch:
    inputs:
      code:
        description: 'Arduino sketch code'
        required: true
      fqbn:
        description: 'Board FQBN'
        required: true
        default: 'arduino:avr:uno'
      release_tag:
        description: 'Release tag for firmware (e.g. v1.0.0). Leave empty to skip release.'
        required: false
        default: ''

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:

      # ── 0. Validate board ──────────────────────────────────
      - name: Validate board
        run: |
          FQBN="${{ github.event.inputs.fqbn }}"
          case "$FQBN" in
            arduino:avr:uno|arduino:avr:nano|arduino:avr:mega|arduino:avr:*)
              echo "BOARD_FAMILY=avr" >> $GITHUB_ENV
              ;;
            esp8266:esp8266:*)
              echo "BOARD_FAMILY=esp8266" >> $GITHUB_ENV
              ;;
            esp32:esp32:*)
              echo "BOARD_FAMILY=esp32" >> $GITHUB_ENV
              ;;
            rp2040:rp2040:*)
              echo "::error::RP2040 is not supported in this workflow."
              exit 1
              ;;
            *)
              echo "BOARD_FAMILY=unknown" >> $GITHUB_ENV
              ;;
          esac
          echo "Using FQBN: $FQBN"

      # ── 1. Install arduino-cli ─────────────────────────────
      - name: Install arduino-cli
        run: |
          curl -fsSL https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Linux_64bit.tar.gz -o arduino-cli.tar.gz
          tar -xzf arduino-cli.tar.gz
          sudo mv arduino-cli /usr/local/bin/arduino-cli
          arduino-cli version

      # ── 2. Install board cores ─────────────────────────────
      - name: Install board cores
        run: |
          arduino-cli core update-index

          # Always install AVR core
          arduino-cli core install arduino:avr

          if [[ "$BOARD_FAMILY" == "esp8266" ]]; then
            echo "Installing ESP8266 core..."
            arduino-cli config init
            arduino-cli config add board_manager.additional_urls \
              https://arduino.esp8266.com/stable/package_esp8266com_index.json
            arduino-cli core update-index
            arduino-cli core install esp8266:esp8266
          fi

          if [[ "$BOARD_FAMILY" == "esp32" ]]; then
            echo "Installing ESP32 core..."
            arduino-cli config init
            arduino-cli config add board_manager.additional_urls \
              https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
            arduino-cli core update-index
            arduino-cli core install esp32:esp32
          fi

      # ── 3. Write sketch to file ────────────────────────────
      - name: Write sketch
        env:
          SKETCH_CODE: ${{ github.event.inputs.code }}
        run: |
          mkdir -p /tmp/sketch/sketch
          printf '%s' "$SKETCH_CODE" > /tmp/sketch/sketch/sketch.ino
          echo "Sketch written:"
          cat /tmp/sketch/sketch/sketch.ino

      # ── 4. Detect and install libraries ───────────────────
      - name: Detect and install libraries
        env:
          CODE: ${{ github.event.inputs.code }}
        run: |
          CODE="$CODE"

          BUILTINS="Wire.h SPI.h EEPROM.h SoftwareSerial.h HardwareSerial.h Arduino.h avr/ pgmspace.h ESP8266WiFi.h ESP8266WebServer.h WiFi.h WebServer.h"

          declare -A LIBMAP
          LIBMAP["LiquidCrystal.h"]="LiquidCrystal"
          LIBMAP["Servo.h"]="Servo"
          LIBMAP["Stepper.h"]="Stepper"
          LIBMAP["SD.h"]="SD"
          LIBMAP["DHT.h"]="DHT sensor library"
          LIBMAP["DHT11.h"]="DHT sensor library"
          LIBMAP["Adafruit_SSD1306.h"]="Adafruit SSD1306"
          LIBMAP["Adafruit_GFX.h"]="Adafruit GFX Library"
          LIBMAP["Adafruit_BMP085.h"]="Adafruit BMP085 Library"
          LIBMAP["Adafruit_BMP280.h"]="Adafruit BMP280 Library"
          LIBMAP["Adafruit_BME280.h"]="Adafruit BME280 Library"
          LIBMAP["Adafruit_NeoPixel.h"]="Adafruit NeoPixel"
          LIBMAP["FastLED.h"]="FastLED"
          LIBMAP["IRremote.h"]="IRremote"
          LIBMAP["LiquidCrystal_I2C.h"]="LiquidCrystal I2C"
          LIBMAP["NewPing.h"]="NewPing"
          LIBMAP["Keypad.h"]="Keypad"
          LIBMAP["RTClib.h"]="RTClib"
          LIBMAP["DS3231.h"]="DS3231"
          LIBMAP["OneWire.h"]="OneWire"
          LIBMAP["DallasTemperature.h"]="DallasTemperature"
          LIBMAP["TM1637Display.h"]="TM1637"
          LIBMAP["HX711.h"]="HX711"
          LIBMAP["MFRC522.h"]="MFRC522"
          LIBMAP["PubSubClient.h"]="PubSubClient"
          LIBMAP["ArduinoJson.h"]="ArduinoJson"
          LIBMAP["Blynk.h"]="Blynk"
          LIBMAP["U8g2lib.h"]="U8g2"
          LIBMAP["Adafruit_ILI9341.h"]="Adafruit ILI9341"
          LIBMAP["Adafruit_ST7735.h"]="Adafruit ST7735 and ST7789 Library"
          LIBMAP["MPU6050.h"]="MPU6050"
          LIBMAP["Adafruit_MPU6050.h"]="Adafruit MPU6050"
          LIBMAP["AccelStepper.h"]="AccelStepper"
          LIBMAP["Adafruit_MotorShield.h"]="Adafruit Motor Shield V2 Library"
          LIBMAP["NTPClient.h"]="NTPClient"
          LIBMAP["TinyGPS++.h"]="TinyGPSPlus"
          LIBMAP["Bounce2.h"]="Bounce2"
          LIBMAP["RF24.h"]="RF24"
          LIBMAP["nRF24L01.h"]="RF24"
          LIBMAP["LoRa.h"]="LoRa"
          LIBMAP["Encoder.h"]="Encoder"
          LIBMAP["TimerOne.h"]="TimerOne"
          LIBMAP["elapsedMillis.h"]="elapsedMillis"
          LIBMAP["QTRSensors.h"]="QTRSensors"
          LIBMAP["VL53L0X.h"]="VL53L0X"
          LIBMAP["MQUnifiedsensor.h"]="MQUnifiedsensor"
          LIBMAP["Adafruit_Fingerprint.h"]="Adafruit Fingerprint Sensor Library"
          LIBMAP["ESP32Servo.h"]="ESP32Servo"
          LIBMAP["MD_MAX72xx.h"]="MD_MAX72XX"
          LIBMAP["MD_Parola.h"]="MD_Parola"
          LIBMAP["Adafruit_PWMServoDriver.h"]="Adafruit PWM Servo Driver Library"
          LIBMAP["ShiftRegister74HC595.h"]="ShiftRegister74HC595"
          LIBMAP["PCF8574.h"]="PCF8574"
          LIBMAP["L298N.h"]="L298N"
          LIBMAP["ezButton.h"]="ezButton"
          LIBMAP["TaskScheduler.h"]="TaskScheduler"

          resolve_libname() {
            local HEADER="$1"
            if [[ -n "${LIBMAP[$HEADER]}" ]]; then
              echo "${LIBMAP[$HEADER]}"
            else
              local SEARCH="${HEADER%.h}"
              arduino-cli lib search "$SEARCH" --format json 2>/dev/null | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          libs=data.get('libraries',[])
          if libs: print(libs[0]['name'])
          " 2>/dev/null || echo ""
            fi
          }

          declare -A SKIP_HEADERS
          while IFS= read -r SKIP_HEADER; do
            [[ -z "$SKIP_HEADER" ]] && continue
            SKIP_HEADERS["$SKIP_HEADER"]=1
            SKIP_LIBNAME=$(resolve_libname "$SKIP_HEADER")
            if [[ -n "$SKIP_LIBNAME" ]]; then
              if arduino-cli lib list 2>/dev/null | awk '{print $1}' | grep -qxF "$SKIP_LIBNAME"; then
                arduino-cli lib uninstall "$SKIP_LIBNAME" || true
              fi
            fi
          done < <(echo "$CODE" | grep -oP '(?<=// !skip #include <)[^>]+' || true)

          INCLUDES=$(echo "$CODE" | grep -oP '(?<=#include <)[^>]+' || true)

          for HEADER in $INCLUDES; do
            SKIP=false
            for B in $BUILTINS; do
              if [[ "$HEADER" == "$B" ]]; then SKIP=true; break; fi
            done
            if [ "$SKIP" = true ]; then continue; fi
            if [[ -n "${SKIP_HEADERS[$HEADER]}" ]]; then continue; fi

            if [[ -n "${LIBMAP[$HEADER]}" ]]; then
              LIBNAME="${LIBMAP[$HEADER]}"
              arduino-cli lib install "$LIBNAME" || echo "Warning: could not install $LIBNAME"
            else
              SEARCH="${HEADER%.h}"
              RESULT=$(arduino-cli lib search "$SEARCH" --format json 2>/dev/null | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          libs=data.get('libraries',[])
          if libs: print(libs[0]['name'])
          " 2>/dev/null || echo "")
              if [[ -n "$RESULT" ]]; then
                arduino-cli lib install "$RESULT" || echo "Warning: could not install $RESULT"
              fi
            fi
          done

          GIT_LIBS=$(echo "$CODE" | grep -oP '(?<=// @lib )https://github\.com/\S+' || true)
          for GIT_URL in $GIT_LIBS; do
            CLEAN_URL="${GIT_URL%.git}"
            REPO_NAME=$(basename "$CLEAN_URL")
            LIB_DIR="$HOME/Arduino/libraries/$REPO_NAME"
            mkdir -p "$(dirname "$LIB_DIR")"
            git clone --depth=1 "$CLEAN_URL" "$LIB_DIR" || echo "Warning: could not clone $CLEAN_URL"
          done

      # ── 5. Compile ─────────────────────────────────────────
      - name: Compile sketch
        run: |
          mkdir -p /tmp/output
          arduino-cli compile \
            --fqbn "${{ github.event.inputs.fqbn }}" \
            --output-dir /tmp/output \
            /tmp/sketch/sketch
          echo "Compile successful. Output files:"
          ls -lh /tmp/output/

      # ── 6. Prepare firmware artifacts ─────────────────────
      - name: Prepare firmware files
        run: |
          mkdir -p /tmp/firmware
          FQBN="${{ github.event.inputs.fqbn }}"

          if [[ "$BOARD_FAMILY" == "esp8266" ]]; then
            # ESP8266: single .bin file
            BIN=$(ls /tmp/output/*.bin 2>/dev/null | head -1)
            if [ -z "$BIN" ]; then
              echo "::error::No .bin file found for ESP8266"
              exit 1
            fi
            cp "$BIN" /tmp/firmware/firmware.bin
            echo "ESP8266 firmware ready: firmware.bin"

            # Generate manifest.json
            cat > /tmp/firmware/manifest.json << 'EOF'
          {
            "name": "Custom Firmware",
            "version": "1.0.0",
            "builds": [
              {
                "chipFamily": "ESP8266",
                "parts": [
                  { "path": "firmware.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF

          elif [[ "$BOARD_FAMILY" == "esp32" ]]; then
            # ESP32: needs bootloader + partitions + boot_app0 + app
            BOOTLOADER=$(ls /tmp/output/*.bootloader.bin 2>/dev/null | head -1)
            PARTITIONS=$(ls /tmp/output/*.partitions.bin 2>/dev/null | head -1)
            APP=$(ls /tmp/output/sketch.ino.bin 2>/dev/null || ls /tmp/output/*.bin 2>/dev/null | grep -v bootloader | grep -v partition | head -1)

            # Find boot_app0.bin from esp32 core
            BOOT_APP0=$(find ~/.arduino15 -name "boot_app0.bin" 2>/dev/null | head -1)

            [ -n "$BOOTLOADER" ] && cp "$BOOTLOADER" /tmp/firmware/bootloader.bin
            [ -n "$PARTITIONS" ] && cp "$PARTITIONS" /tmp/firmware/partitions.bin
            [ -n "$BOOT_APP0" ] && cp "$BOOT_APP0" /tmp/firmware/boot_app0.bin
            [ -n "$APP" ] && cp "$APP" /tmp/firmware/firmware.bin

            echo "ESP32 firmware files:"
            ls -lh /tmp/firmware/

            # Generate manifest.json
            cat > /tmp/firmware/manifest.json << 'EOF'
          {
            "name": "Custom Firmware",
            "version": "1.0.0",
            "builds": [
              {
                "chipFamily": "ESP32",
                "parts": [
                  { "path": "bootloader.bin", "offset": 4096 },
                  { "path": "partitions.bin", "offset": 32768 },
                  { "path": "boot_app0.bin", "offset": 57344 },
                  { "path": "firmware.bin", "offset": 65536 }
                ]
              }
            ]
          }
          EOF

          else
            # AVR: just copy hex
            HEX=$(ls /tmp/output/*.hex 2>/dev/null | head -1)
            if [ -z "$HEX" ]; then
              echo "::error::No .hex file found for AVR"
              exit 1
            fi
            cp "$HEX" /tmp/firmware/firmware.hex
            echo "AVR firmware ready: firmware.hex"
            echo "Note: AVR .hex files are not compatible with ESP Web Tools."
          fi

          echo "--- Final firmware directory ---"
          ls -lh /tmp/firmware/

      # ── 7. Upload firmware as workflow artifact ────────────
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-firmware
          path: /tmp/firmware/
          retention-days: 7

      # ── 8. (Optional) Create GitHub Release ───────────────
      - name: Create GitHub Release
        if: ${{ github.event.inputs.release_tag != '' && (env.BOARD_FAMILY == 'esp8266' || env.BOARD_FAMILY == 'esp32') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Firmware ${{ github.event.inputs.release_tag }}
          body: |
            Auto-compiled firmware for board: `${{ github.event.inputs.fqbn }}`
            
            ## Flashing Instructions
            Use [ESP Web Flasher](YOUR_GITHUB_PAGES_URL) to flash directly from your browser.
            No software installation required — Chrome or Edge only.
          files: /tmp/firmware/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
